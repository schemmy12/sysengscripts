<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tee Time Radar</title>
<style>
  :root {
    --pine: #183d33;
    --fairway: #4e9a70;
    --gold: #e7b84f;
    --paper: #fffdf8;
    --sand: #f5f0e7;
    --line: #d9e2dc;
    --muted: #60756f;
  }
  * { box-sizing: border-box; }
  body {
    width: 320px;
    margin: 0;
    background: var(--sand);
    color: var(--pine);
    font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    padding: 14px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 22px;
    line-height: 1;
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 9px 0;
    font-weight: 800;
  }
  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--pine);
  }
  select {
    height: 36px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--pine);
    padding: 0 9px;
    font: inherit;
    font-weight: 800;
  }
  button, a.button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    width: 100%;
    border: 0;
    border-radius: 7px;
    background: var(--pine);
    color: #fff;
    font-weight: 900;
    text-decoration: none;
    cursor: pointer;
  }
  button.secondary, a.secondary {
    background: #fff;
    border: 1px solid var(--line);
    color: var(--pine);
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .status {
    min-height: 42px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }
  .ok { color: var(--fairway); }
  .warn { color: #8a5c00; }
</style>
</head>
<body>
<main>
  <h1>Tee Time Radar</h1>

  <section class="card">
    <label>
      Monitor
      <input id="enabled" type="checkbox">
    </label>
    <label>
      Passive capture
      <input id="passiveCapture" type="checkbox">
    </label>
    <label>
      Auto-open tab
      <input id="autoOpenTab" type="checkbox">
    </label>
    <label>
      Poll
      <select id="pollMinutes">
        <option value="1">1 min</option>
        <option value="2">2 min</option>
        <option value="5">5 min</option>
        <option value="10">10 min</option>
      </select>
    </label>
  </section>

  <section class="card actions">
    <button id="captureNow" type="button">Capture Now</button>
    <a class="button secondary" href="http://127.0.0.1:8765/integrations/tee_time_alerts/tee_time_dashboard.html" target="_blank">Open Dashboard</a>
    <a class="button secondary" href="http://127.0.0.1:8765/" target="_blank">Open Helper</a>
  </section>

  <section class="card status" id="status">Loading...</section>
</main>
<script src="popup.js"></script>
</body>
</html>
