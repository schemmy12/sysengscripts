<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Photo Gallery</title>
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
:root {
  --navy:#2F4166;
  --bright-blue:#235EA0;
  --teal:#80C3C4;
  --gold:#f7cb47;
  --border:#dde2ea;
  --text:#2F4166;
  --muted:#5a6a85;
  --soft:#f6f8fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:transparent;color:var(--text);}
.gallery-widget{width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.gallery-header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 16px;background:var(--navy);color:#fff;}
.header-main{display:flex;align-items:center;gap:10px;min-width:0;}
.header-icon{width:28px;height:28px;border-radius:6px;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-text{min-width:0;}
.gallery-title{font-size:15px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gallery-subtitle{font-size:11px;font-weight:500;opacity:.78;margin-top:1px;}
.open-folder{display:none;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.32);border-radius:7px;color:#fff;text-decoration:none;font-size:12px;font-weight:700;padding:7px 10px;white-space:nowrap;}
.open-folder.show{display:inline-flex;}
.gallery-body{padding:14px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.gallery-card{display:block;border:1px solid var(--border);border-radius:8px;background:#fff;text-decoration:none;color:var(--text);overflow:hidden;transition:box-shadow .15s,transform .15s,border-color .15s;min-width:0;}
.gallery-card:hover{box-shadow:0 6px 18px rgba(47,65,102,.14);transform:translateY(-1px);border-color:#c8d3e2;}
.thumb{position:relative;width:100%;aspect-ratio:4/3;background:var(--soft);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.thumb-icon{width:44px;height:44px;color:var(--bright-blue);}
.thumb.folder{background:#eef6f6;}
.thumb.video{background:#fef9e7;}
.card-meta{padding:10px 11px 11px;}
.card-name{font-size:12px;font-weight:700;line-height:1.35;color:var(--navy);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:32px;}
.card-type{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.status{padding:34px 16px;text-align:center;color:var(--muted);font-size:13px;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:520px){
  .gallery-header{align-items:flex-start;flex-direction:column;}
  .open-folder.show{display:flex;}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
</style>
</head>
<body>
<section class="gallery-widget" aria-label="Drive photo gallery">
  <div class="gallery-header">
    <div class="header-main">
      <div class="header-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 7h7l2 2h9v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 7V5a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v2"/></svg>
      </div>
      <div class="header-text">
        <div class="gallery-title" id="gallery-title">Photo Gallery</div>
        <div class="gallery-subtitle" id="gallery-subtitle">Loading Drive folder...</div>
      </div>
    </div>
    <a class="open-folder" id="open-folder" href="#" target="_blank" rel="noopener">
      Open folder
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
    </a>
  </div>
  <div class="gallery-body" id="gallery-body">
    <div class="status"><div class="spinner"></div>Loading gallery...</div>
  </div>
</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwDMZzrahIhHwlEcciQ4TcEOHOdih5h7Sy-Wg-uVfiSS_gNvZeGXr42TkK3RoS6MRm9Cg/exec";
const DEFAULT_FOLDER_ID = "1Jg5qiNyPbD694KunbORUDSOYw0s4vq90";
const params = new URLSearchParams(window.location.search);
const FOLDER_ID = params.get("folderId") || params.get("folder") || params.get("url") || DEFAULT_FOLDER_ID;
const MAX_ITEMS = params.get("max") || "80";
const TITLE = params.get("title") || "";

function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function iconSvg(type) {
  if (type === "folder") {
    return '<svg class="thumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h7l2 2h9v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 7V5a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v2"/></svg>';
  }
  if (type === "video") {
    return '<svg class="thumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>';
  }
  return '<svg class="thumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
}
function itemTypeLabel(item) {
  if (item.type === "folder") return "Folder";
  if (item.type === "image") return "Photo";
  if (item.type === "video") return "Video";
  return "File";
}
function renderItem(item) {
  const thumbClass = `thumb ${item.type}`;
  const thumb = item.thumbnailUrl
    ? `<img src="${esc(item.thumbnailUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="thumb-fallback" style="display:none">${iconSvg(item.type)}</div>`
    : iconSvg(item.type);
  return `<a class="gallery-card" href="${esc(item.url)}" target="_blank" rel="noopener">
    <div class="${thumbClass}">${thumb}</div>
    <div class="card-meta">
      <div class="card-name">${esc(item.name)}</div>
      <div class="card-type">${itemTypeLabel(item)}</div>
    </div>
  </a>`;
}
function renderGallery(data) {
  const title = TITLE || data.title || "Photo Gallery";
  document.getElementById("gallery-title").textContent = title;
  document.getElementById("gallery-subtitle").textContent = `${data.count || 0} items`;
  const openFolder = document.getElementById("open-folder");
  openFolder.href = `https://drive.google.com/drive/folders/${encodeURIComponent(data.folderId)}`;
  openFolder.classList.add("show");

  const body = document.getElementById("gallery-body");
  const items = data.items || [];
  if (!items.length) {
    body.innerHTML = '<div class="status">No photos or folders found yet.</div>';
    return;
  }
  body.innerHTML = `<div class="gallery-grid">${items.map(renderItem).join("")}</div>`;
}
function showError(message) {
  document.getElementById("gallery-subtitle").textContent = "Gallery unavailable";
  document.getElementById("gallery-body").innerHTML = `<div class="status">${esc(message || "Could not load this Drive gallery.")}</div>`;
}
async function init() {
  if (!FOLDER_ID) {
    showError("Add a Drive folder ID to the embed URL.");
    return;
  }
  try {
    const url = `${API_URL}?type=driveGallery&folderId=${encodeURIComponent(FOLDER_ID)}&max=${encodeURIComponent(MAX_ITEMS)}${TITLE ? `&title=${encodeURIComponent(TITLE)}` : ""}`;
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderGallery(data);
  } catch(e) {
    console.error("Drive gallery failed to load", e);
    showError(e.message);
  }
}
init();
</script>
</body>
</html>
