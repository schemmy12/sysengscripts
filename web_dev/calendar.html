<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --navy: #2F4166;
    --navy-dark: #1a2744;
    --bright-blue: #235EA0;
    --teal: #80C3C4;
    --gold: #f7cb47;
    --off-white: #F6F5F0;
    --light-bg: #f0f2f5;
    --border: #dde2ea;
    --text: #2F4166;
    --muted: #5a6a85;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--off-white); color: var(--text); }

  /* ── Hero (exact match to index.html) ── */
  .hero { background: linear-gradient(135deg, #235EA0 0%, #2F4166 100%); position: relative; overflow: hidden; }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.015) 40px, rgba(255,255,255,.015) 80px);
  }
  .hero-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
  .hero-nav { display: table; width: 100%; table-layout: fixed; border-bottom: 1px solid rgba(255,255,255,.08); position: relative; z-index: 1; }
  .hero-nav-left   { display: table-cell; width: 15%; vertical-align: middle; padding: 16px 16px; text-align: left; }
  .hero-nav-center { display: table-cell; width: 55%; vertical-align: middle; padding: 16px 0; text-align: center; }
  .hero-nav-right  { display: table-cell; width: 30%; vertical-align: middle; padding: 16px 16px; text-align: right; }
  .hero-logo { display: inline-flex; align-items: center; text-decoration: none; }
  .logo-icon { width: 120px; height: 64px; flex-shrink: 0; }
  .logo-icon svg { width: 100%; height: 100%; }
  .hero-nav-center a {
    color: #fff; font-size: 17px; text-decoration: none; font-weight: 500;
    font-family: 'Poppins', sans-serif;
    letter-spacing: .2px; white-space: nowrap; margin: 0 14px; transition: opacity .15s;
  }
  .hero-nav-center a:hover { opacity: .75; }
  .hero-nav-center a.active { border-bottom: 2px solid var(--gold); padding-bottom: 2px; }
  .hero-cta {
    display: inline-block; background: var(--gold); color: var(--navy);
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    font-family: 'Poppins', sans-serif; text-transform: uppercase; text-decoration: none;
    padding: 12px 18px; border-radius: 4px; white-space: nowrap;
  }
  .hero-cta:hover { background: #e8b800; }
  .hero-body { padding: 24px 0 36px; position: relative; z-index: 1; }
  .hero-title {
    font-size: 42px; font-weight: 800; color: var(--gold);
    font-family: 'Poppins', sans-serif;
    line-height: 1.1; font-style: italic; letter-spacing: -.5px; padding-left: 16px;
  }

  /* ── Calendar Container ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }

  .cal-controls {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; background: #fff;
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px;
  }
  .cal-nav { display: flex; align-items: center; gap: 12px; }
  .cal-nav button {
    width: 34px; height: 34px; border-radius: 6px;
    border: 1px solid var(--border); background: #fff;
    font-size: 16px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .cal-nav button:hover { background: var(--light-bg); }
  .cal-month { font-size: 20px; font-weight: 700; color: var(--navy); min-width: 200px; text-align: center; }
  .cal-today-btn {
    background: var(--navy); color: #fff; border: none;
    padding: 8px 16px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif;
  }
  .cal-today-btn:hover { opacity: .85; }

  .cal-grid { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--navy); }
  .cal-weekday { text-align: center; padding: 12px 0; font-size: 12px; font-weight: 700; letter-spacing: .5px; color: rgba(255,255,255,.8); text-transform: uppercase; }
  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border); }
  .cal-day { min-height: 110px; padding: 8px 6px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .cal-day.other-month { background: #fafafa; }
  .cal-day.today { background: #f0f4ff; }
  .cal-day-num {
    font-size: 13px; font-weight: 600; color: var(--navy);
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin-bottom: 4px;
  }
  .cal-day.today .cal-day-num { background: var(--navy); color: #fff; }
  .cal-day.other-month .cal-day-num { color: #bbb; }

  .cal-event {
    font-size: 11px; font-weight: 600; padding: 3px 6px; border-radius: 4px;
    margin-bottom: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: opacity .15s;
  }
  .cal-event:hover { opacity: .8; }
  .cal-event.type-in-person  { background: #dbeafe; color: #1e40af; }
  .cal-event.type-virtual    { background: #d1fae5; color: #065f46; }
  .cal-event.type-hybrid     { background: #ede9fe; color: #5b21b6; }
  .cal-event.type-default    { background: #fef3c7; color: #92400e; }
  .cal-event-more { font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 6px; font-weight: 600; }

  /* ── Modal ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; margin-bottom: 12px; }
  .modal-tag.type-in-person  { background: #dbeafe; color: #1e40af; }
  .modal-tag.type-virtual    { background: #d1fae5; color: #065f46; }
  .modal-tag.type-hybrid     { background: #ede9fe; color: #5b21b6; }
  .modal-tag.type-default    { background: #fef3c7; color: #92400e; }
  .modal-title { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 16px; line-height: 1.3; }
  .modal-row { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text); margin-bottom: 10px; }
  .modal-row svg { color: var(--navy); flex-shrink: 0; margin-top: 2px; }
  .modal-desc { font-size: 14px; line-height: 1.7; color: var(--text); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal-link { display: inline-block; margin-top: 16px; background: var(--gold); color: var(--navy); font-size: 13px; font-weight: 700; text-decoration: none; padding: 10px 20px; border-radius: 6px; }
  .modal-link:hover { background: #e8b800; }
  .close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .close-btn:hover { color: #000; }

  .status { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .hero-title { font-size: 34px; }
    .hero-nav-center { display: none; }
    .cal-day { min-height: 70px; }
    .cal-event { display: none; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-nav">
      <div class="hero-nav-left">
        <a class="hero-logo" href="index.html">
          <div class="logo-icon">
            <svg viewBox="0 0 110 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="28" y1="2"  x2="28" y2="10" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="28" y1="54" x2="28" y2="62" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="2"  y1="32" x2="10" y2="32" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="46" y1="32" x2="54" y2="32" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="8"  y1="12" x2="14" y2="18" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="48" y1="12" x2="42" y2="18" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="8"  y1="52" x2="14" y2="46" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="48" y1="52" x2="42" y2="46" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(22.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(67.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(112.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(157.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(202.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(247.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(292.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(337.5 28 32)"/>
              <text x="18" y="43" fill="white" font-size="28" font-weight="900" font-family="Arial Black, Arial" letter-spacing="1">RISE</text>
            </svg>
          </div>
        </a>
      </div>
      <div class="hero-nav-center">
        <a href="handbook.html">Rise Fellow Handbook</a>
        <a href="calendar.html" class="active">Rise Calendar</a>
        <a href="https://calendly.com/rise-for-the-world" target="_blank" rel="noopener">Book a Call</a>
      </div>
      <div class="hero-nav-right"></div>
    </div>
    <div class="hero-body">
      <div class="hero-title">Rise Calendar</div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWpy7prAGQ13eOeXIOZoUfIsZ_yynbAQar33rthMfnYs4J01fXnZknhdphSR1yMnuK/exec";
</script>

<div class="container">
  <div id="cal-status" class="status"><div class="spinner"></div>Loading calendar…</div>
  <div id="cal-wrap" style="display:none">
    <div class="cal-controls">
      <div class="cal-nav">
        <button id="prev">&#8249;</button>
        <div class="cal-month" id="cal-month"></div>
        <button id="next">&#8250;</button>
      </div>
      <button class="cal-today-btn" id="today-btn">Today</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div>
        <div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
        <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div>
        <div class="cal-weekday">Sat</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div id="m-tag"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-row" id="m-date">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="m-date-text"></span>
    </div>
    <div class="modal-row" id="m-loc">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="m-loc-text"></span>
    </div>
    <div id="m-status" style="font-size:13px;color:var(--muted);margin-bottom:8px;display:none;"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div id="m-link"></div>
  </div>
</div>

<script>
let allEvents = [], viewYear, viewMonth;
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function typeClass(type) {
  if (!type) return "type-default";
  const t = type.toLowerCase();
  if (t.includes("virtual")) return "type-virtual";
  if (t.includes("hybrid"))  return "type-hybrid";
  if (t.includes("person") || t.includes("in-person")) return "type-in-person";
  return "type-default";
}
function parseDate(str) { return str ? new Date(str) : null; }
function formatDate(str) {
  const d = parseDate(str);
  return d ? d.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" }) : "";
}
function eventsForDay(y, m, d) {
  return allEvents.filter(ev => {
    const dt = parseDate(ev.date);
    return dt && dt.getFullYear()===y && dt.getMonth()===m && dt.getDate()===d;
  });
}

function renderCalendar() {
  const today = new Date();
  document.getElementById("cal-month").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
  let html = "";
  const totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let i=0; i<totalCells; i++) {
    let day, month, year, cls="cal-day";
    if (i<firstDay) {
      day=daysInPrev-firstDay+i+1; month=viewMonth-1; year=viewYear;
      if(month<0){month=11;year--;} cls+=" other-month";
    } else if (i>=firstDay+daysInMonth) {
      day=i-firstDay-daysInMonth+1; month=viewMonth+1; year=viewYear;
      if(month>11){month=0;year++;} cls+=" other-month";
    } else {
      day=i-firstDay+1; month=viewMonth; year=viewYear;
      if(day===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear()) cls+=" today";
    }
    const dayEvents = eventsForDay(year, month, day);
    let evHtml = dayEvents.slice(0,3).map(ev=>`<div class="cal-event ${typeClass(ev.type)}" data-idx="${allEvents.indexOf(ev)}">${ev.name}</div>`).join("");
    if (dayEvents.length>3) evHtml+=`<div class="cal-event-more">+${dayEvents.length-3} more</div>`;
    html+=`<div class="${cls}"><div class="cal-day-num">${day}</div>${evHtml}</div>`;
  }
  document.getElementById("cal-days").innerHTML = html;
  document.querySelectorAll(".cal-event[data-idx]").forEach(el=>el.addEventListener("click",()=>openModal(allEvents[+el.dataset.idx])));
}

function openModal(ev) {
  const tc = typeClass(ev.type);
  const tags = [ev.type, ev.category].filter(Boolean);
  document.getElementById("m-tag").innerHTML = tags.map(t=>`<div class="modal-tag ${typeClass(t)}" style="margin-right:6px;display:inline-block">${t}</div>`).join("");
  document.getElementById("m-title").textContent = ev.name;
  let dateStr = formatDate(ev.date);
  if (ev.endDate&&ev.endDate!==ev.date) dateStr+=` – ${formatDate(ev.endDate)}`;
  if (ev.time) dateStr+=` · ${ev.time}`;
  document.getElementById("m-date-text").textContent = dateStr;
  const locRow = document.getElementById("m-loc");
  const locParts = [ev.venue, ev.location].filter(Boolean);
  if (locParts.length) { document.getElementById("m-loc-text").textContent=locParts.join(" · "); locRow.style.display="flex"; }
  else locRow.style.display="none";
  const statusEl = document.getElementById("m-status");
  if (ev.status) { statusEl.textContent=`Status: ${ev.status}`; statusEl.style.display="block"; } else statusEl.style.display="none";
  document.getElementById("m-desc").textContent = ev.description||"";
  document.getElementById("m-desc").style.display = ev.description?"block":"none";
  document.getElementById("m-link").innerHTML = ev.link?`<a class="modal-link" href="${ev.link}" target="_blank" rel="noopener">Register / Learn More →</a>`:"";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); document.body.style.overflow=""; }

document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e=>{if(e.target===document.getElementById("overlay"))closeModal();});
document.addEventListener("keydown", e=>e.key==="Escape"&&closeModal());
document.getElementById("prev").addEventListener("click",()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderCalendar();});
document.getElementById("next").addEventListener("click",()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderCalendar();});
document.getElementById("today-btn").addEventListener("click",()=>{const t=new Date();viewYear=t.getFullYear();viewMonth=t.getMonth();renderCalendar();});

async function init() {
  const today = new Date();
  viewYear = today.getFullYear(); viewMonth = today.getMonth();
  try {
    const res  = await fetch(API_URL+"?type=calendar");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allEvents = data.events.filter(e=>e.name&&e.date);
    document.getElementById("cal-status").style.display="none";
    document.getElementById("cal-wrap").style.display="block";
    renderCalendar();
  } catch(e) {
    document.getElementById("cal-status").innerHTML=`<div>❌ Could not load calendar. Error: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
