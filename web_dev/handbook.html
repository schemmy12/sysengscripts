<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Fellow Handbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
:root {
  --navy:#2F4166; --navy-dark:#1a2744; --bright-blue:#235EA0;
  --teal:#80C3C4; --gold:#f7cb47; --off-white:#F6F5F0;
  --light-bg:#f0f2f5; --border:#dde2ea; --text:#2F4166; --muted:#5a6a85;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--off-white);color:var(--text);}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,#235EA0 0%,#2F4166 100%);position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 80px);}
.hero-inner{max-width:1100px;margin:0 auto;padding:0 20px;}
.hero-nav{display:table;width:100%;table-layout:fixed;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.hero-nav-left{display:table-cell;width:20%;vertical-align:middle;padding:24px 16px;text-align:left;}
.hero-nav-right{display:table-cell;width:80%;vertical-align:middle;padding:24px 16px;text-align:right;}
.hero-logo{display:inline-flex;align-items:center;text-decoration:none;}
.logo-icon{width:120px;height:64px;flex-shrink:0;}
.logo-icon img{width:100%;height:100%;object-fit:contain;}
.hero-body{padding:24px 0 36px;position:relative;z-index:1;}
.hero-title{font-size:42px;font-weight:800;color:var(--gold);font-family:'Poppins',sans-serif;line-height:1.1;letter-spacing:-.5px;padding-left:16px;}

/* ── Search ── */
.search-wrap{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;}
.search-inner{max-width:1100px;margin:0 auto;position:relative;}
.search-row{display:flex;align-items:center;gap:10px;border:2px solid var(--navy);border-radius:12px;padding:10px 16px;background:#fff;}
.search-row input{flex:1;border:none;outline:none;font-size:14px;color:var(--text);font-family:'Poppins',sans-serif;}
.search-row input::placeholder{color:var(--muted);}
.search-row svg{color:var(--navy);flex-shrink:0;}
.hb-search-results{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:200;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 16px 36px rgba(47,65,102,.16);overflow:hidden;max-height:380px;overflow-y:auto;}
.hb-search-results.open{display:block;}
.hb-search-result{display:block;width:100%;padding:12px 16px;border:0;border-bottom:1px solid #edf1f7;background:#fff;text-align:left;cursor:pointer;font-family:'Poppins',sans-serif;}
.hb-search-result:last-child{border-bottom:none;}
.hb-search-result:hover,.hb-search-result.active{background:#f4f7ff;}
.hb-search-result-title{font-size:13px;font-weight:700;color:var(--navy);line-height:1.35;margin-bottom:3px;}
.hb-search-result-meta{font-size:11px;font-weight:700;color:var(--bright-blue);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;}
.hb-search-result-snippet{font-size:12px;color:var(--muted);line-height:1.45;}
.hb-search-result mark{background:#fef3c7;color:var(--navy);padding:0 2px;border-radius:2px;}
.hb-search-empty{padding:14px 16px;font-size:13px;color:var(--muted);}

/* ── Layout ── */
.handbook-layout{max-width:1100px;margin:0 auto;padding:24px 20px 60px;display:flex;gap:24px;align-items:flex-start;}

/* ── Sidebar ── */
.sidebar{width:256px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;}
.sidebar-header{padding:14px 16px 10px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif;text-align:left;transition:background .15s;}
.cat-btn:hover{background:var(--light-bg);}
.cat-btn.open{background:#eef2ff;color:var(--bright-blue);}
.cat-chevron{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--muted);}
.cat-btn.open .cat-chevron{transform:rotate(180deg);}
.cat-sections{display:none;}
.cat-sections.open{display:block;}
.sec-btn{display:block;width:100%;padding:8px 16px 8px 28px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;color:var(--muted);font-family:'Poppins',sans-serif;text-align:left;line-height:1.4;text-decoration:none;transition:all .15s;}
.sec-btn:hover{color:var(--navy);background:#f4f7ff;}
.sec-btn.active{color:var(--bright-blue);font-weight:600;background:#e8f0ff;border-left:3px solid var(--bright-blue);padding-left:25px;}

/* ── Content ── */
.handbook-content{flex:1;min-width:0;}
.content-panel{display:none;background:#fff;border:1px solid var(--border);border-radius:10px;padding:32px 36px;}
.content-panel.active{display:block;}
.content-panel h2{font-size:21px;font-weight:800;color:var(--navy);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--gold);line-height:1.3;}
.section-heading{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--gold);}
.section-heading h2{flex:1;margin:0;padding:0;border:0;}
.copy-section-link{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--bright-blue);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,border-color .15s,color .15s;}
.copy-section-link:hover,.copy-section-link:focus{background:#f4f7ff;border-color:#b9c8dc;outline:none;}
.copy-section-link.copied{background:var(--bright-blue);border-color:var(--bright-blue);color:#fff;}
.content-panel .page-nav{background:#e6f6f7;border-left:4px solid var(--teal);border-radius:0 6px 6px 0;margin:0 0 24px;padding:20px 26px;}
.content-panel .page-nav-title{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px;}
.content-panel .page-nav ul{margin:0;padding-left:22px;}
.content-panel .page-nav li{margin-bottom:8px;line-height:1.5;}
.content-panel .page-nav li:last-child{margin-bottom:0;}
.content-panel .page-nav a{font-size:13px;font-weight:500;color:var(--navy);text-decoration:underline;text-underline-offset:2px;}
.content-panel .page-nav a:hover{color:var(--bright-blue);}
.content-panel h3{font-size:15px;font-weight:700;color:var(--navy);margin:22px 0 10px;}
.content-panel h4{font-size:14px;font-weight:600;color:var(--bright-blue);margin:16px 0 8px;}
.content-panel h3[id]{scroll-margin-top:86px;}
.content-panel p{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:12px;}
.content-panel ul,.content-panel ol{padding-left:24px;margin:8px 0 14px;}
.content-panel li{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:6px;padding-left:2px;}
.content-panel li>ul,.content-panel li>ol{margin:4px 0 4px;padding-left:28px;}
.content-panel ul ul{list-style-type:circle;}
.content-panel ul ul ul{list-style-type:square;}
.content-panel ol ol{list-style-type:lower-alpha;}
.content-panel ol ol ol{list-style-type:lower-roman;}
.content-panel a{color:var(--bright-blue);text-decoration:none;}
.content-panel a:hover{text-decoration:underline;}
.content-panel strong{font-weight:600;}
.hb-underline{text-decoration:underline;}
.note{background:#fef9e7;border-left:4px solid var(--gold);padding:12px 16px;border-radius:0 6px 6px 0;margin:14px 0;font-size:13px;line-height:1.7;}
.warning{background:#fff3f3;border-left:4px solid #e74c3c;padding:12px 16px;border-radius:0 6px 6px 0;margin:14px 0;font-size:13px;line-height:1.7;}
.img-ph{background:var(--light-bg);border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;color:var(--muted);font-size:13px;margin:14px 0;}
.embed-ph{background:#eef3ff;border:2px dashed #b3c6f0;border-radius:8px;padding:20px;text-align:center;color:var(--bright-blue);font-size:13px;margin:14px 0;}
.table-ph{background:#f0fff4;border:2px dashed #a3d9b0;border-radius:8px;padding:20px;text-align:center;color:#2d7a4a;font-size:13px;margin:14px 0;}

/* ── Real tables (parsed from Doc) ── */
.hb-table-wrap{margin:16px 0;overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
.hb-table{width:100%;border-collapse:collapse;font-size:13px;}
.hb-table th,.hb-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6;}
.hb-table th{background:var(--navy);color:#fff;font-weight:600;font-size:12px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.hb-table th a{color:#fff;text-decoration:underline;}
.hb-table tr:nth-child(even) td{background:#fafbfc;}
.hb-table tr:last-child td{border-bottom:none;}
.hb-table a{color:var(--bright-blue);text-decoration:none;word-break:break-word;}
.hb-table a:hover{text-decoration:underline;}
.hb-table td.has-embed{min-width:260px;}
.hb-table-embed{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#f8f9fa;}
.hb-table-embed-frame{position:relative;width:100%;aspect-ratio:16/9;}
.hb-table-embed-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.hb-table-embed-link{display:block;margin-top:7px;font-size:12px;font-weight:500;}

/* ── Real embeds (iframe) ── */
.hb-embed{margin:16px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.hb-embed.hb-embed-video{max-width:640px;} /* keep videos from dominating the page */
.hb-embed-frame{position:relative;width:100%;background:#f8f9fa;}
.hb-embed-frame.slides,.hb-embed-frame.youtube,.hb-embed-frame.vimeo,.hb-embed-frame.loom,.hb-embed-frame.drive-video{padding-bottom:56.25%;} /* 16:9 for video content */
.hb-embed-frame.doc,.hb-embed-frame.sheet,.hb-embed-frame.form{padding-bottom:75%;}                              /* 4:3 */
.hb-embed-frame.drive-pdf,.hb-embed-frame.drive{padding-bottom:129%;}                                             /* 8.5:11 letter portrait for PDFs */
.hb-embed-frame.drive-image{padding-bottom:75%;}                                                                   /* 4:3 for images — Drive viewer centers and lets them fit */
.hb-embed-frame.airtable{padding-bottom:75%;}                                                                      /* 4:3 — Airtable embeds scroll internally */
.hb-embed-frame.other{padding-bottom:60%;}
.hb-embed-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.hb-embed-footer{padding:8px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;}
.hb-embed-footer a{color:var(--bright-blue);text-decoration:none;font-weight:500;}
.hb-embed-footer a:hover{text-decoration:underline;}

/* ── University Cards ── */
.uni-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;}
.uni-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.uni-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);}
.uni-badge{width:64px;height:64px;border-radius:10px;background:#f8f9fa;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden;}
.uni-badge img{width:100%;height:100%;object-fit:contain;padding:6px;}
.uni-badge .uni-fallback{width:100%;height:100%;background:var(--navy);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;}
.uni-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;line-height:1.4;}
.uni-links{display:flex;flex-direction:column;gap:6px;}
.uni-link{font-size:12px;color:var(--bright-blue);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;transition:all .15s;font-weight:500;}
.uni-link:hover{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── Home landing ── */
.handbook-home{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .15s;text-align:center;}
.cat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);}
.cat-card-icon{font-size:28px;margin-bottom:10px;}
.cat-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.cat-card-desc{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── Loading ── */
.hb-loading{text-align:center;padding:80px 20px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .handbook-layout{flex-direction:column;}
  .sidebar{width:100%;position:static;max-height:none;}
  .hero-title{font-size:34px;}
  .handbook-home{grid-template-columns:1fr 1fr;}
  .content-panel{padding:20px;}
  .uni-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-nav">
      <div class="hero-nav-left">
        <a class="hero-logo" href="index.html">
          <div class="logo-icon">
            <img src="https://schemmy12.github.io/sysengscripts/web_dev/Rise_PrimaryRev.png" alt="Rise" />
          </div>
        </a>
      </div>
      <div class="hero-nav-right"></div>
    </div>
    <div class="hero-body">
      <div class="hero-title">Rise Fellow Handbook</div>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="hb-search" type="text" placeholder="Search the handbook…" autocomplete="off" aria-expanded="false" aria-controls="hb-search-results">
    </div>
    <div class="hb-search-results" id="hb-search-results" role="listbox"></div>
  </div>
</div>

<div class="handbook-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">Contents</div>
    <div class="hb-loading"><div class="spinner"></div>Loading…</div>
  </aside>
  <main class="handbook-content" id="hb-content">
    <div class="content-panel active" id="panel-loading">
      <div class="hb-loading">
        <div class="spinner"></div>
        <p style="font-weight:600;color:var(--navy);margin-bottom:8px;" id="loading-msg">Fetching the latest content from the Fellow Handbook…</p>
        <p style="font-size:13px;color:var(--muted);">Reading the Fellow Handbook.<br>This usually takes 5–10 seconds.</p>
      </div>
    </div>
  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwDMZzrahIhHwlEcciQ4TcEOHOdih5h7Sy-Wg-uVfiSS_gNvZeGXr42TkK3RoS6MRm9Cg/exec";
const CANONICAL_HANDBOOK_URL = "https://portal.risefortheworld.org/web_dev/handbook.html";

const ICON_MAP = {
  'getting started':'🏠','programming':'🌐','applying':'🎓',
  'css':'📋','attending':'🏫','safeguarding':'🛡️','wellbeing':'🛡️','postgraduate':'🎯'
};
function getCatIcon(t) {
  t = t.toLowerCase();
  for (const [k,v] of Object.entries(ICON_MAP)) if (t.includes(k)) return v;
  return '📄';
}
function getCatDesc(t) {
  t = t.toLowerCase();
  if (t.includes('getting')) return 'Benefits, code of conduct, funding, and program policies.';
  if (t.includes('programming')) return 'Community events, network building opportunities, and the Innovation Fund.';
  if (t.includes('applying')) return 'College advising, university partners, and financial aid guidance.';
  if (t.includes('css')) return 'How to complete the CSS Profile for Rise higher education funding.';
  if (t.includes('attending')) return 'Higher education funding details, accommodation, and US immigration guidance.';
  if (t.includes('safeguard') || t.includes('wellbeing')) return 'Safeguarding policy, wellbeing support, and hardship funding.';
  if (t.includes('postgraduate')) return 'Graduate education funding, external scholarships, and post-graduation support.';
  return '';
}

// ── University Partners ──
const UNIVERSITIES = [
  { name:'Ashesi University', abbr:'AU', site:'https://www.ashesi.edu.gh', factsheet:'', webinar:'' },
  { name:'African Leadership University', abbr:'ALU', site:'https://www.alueducation.com', factsheet:'', webinar:'' },
  { name:'Davidson College', abbr:'DC', site:'https://www.davidson.edu', factsheet:'', webinar:'' },
  { name:'Durham University', abbr:'DU', site:'https://www.durham.ac.uk', factsheet:'', webinar:'' },
  { name:'Imperial College London', abbr:'ICL', site:'https://www.imperial.ac.uk', factsheet:'', webinar:'' },
  { name:'The University of Iowa', abbr:'UI', site:'https://www.uiowa.edu', factsheet:'', webinar:'' },
  { name:'Lucy Cavendish College, Cambridge', abbr:'LCC', site:'https://www.lucy.cam.ac.uk', factsheet:'', webinar:'' },
  { name:'Minerva University', abbr:'MU', site:'https://www.minerva.edu', factsheet:'', webinar:'' },
  { name:'Northwestern University', abbr:'NU', site:'https://www.northwestern.edu', factsheet:'', webinar:'' },
  { name:'NYU Abu Dhabi', abbr:'NYUAD', site:'https://nyuad.nyu.edu', factsheet:'', webinar:'' },
  { name:'Skidmore College', abbr:'SC', site:'https://www.skidmore.edu', factsheet:'', webinar:'' },
  { name:'Stanford University', abbr:'SU', site:'https://www.stanford.edu', factsheet:'', webinar:'' },
  { name:'Tecnologico de Monterrey', abbr:'TEC', site:'https://www.tec.mx', factsheet:'', webinar:'' },
  { name:'The University of Chicago', abbr:'UChic', site:'https://www.uchicago.edu', factsheet:'', webinar:'' },
  { name:'The University of Edinburgh', abbr:'UE', site:'https://www.ed.ac.uk', factsheet:'', webinar:'' },
  { name:'University of Notre Dame', abbr:'UND', site:'https://www.nd.edu', factsheet:'', webinar:'' },
  { name:'The University of Queensland', abbr:'UQ', site:'https://www.uq.edu.au', factsheet:'', webinar:'' },
  { name:'Vanderbilt University', abbr:'VU', site:'https://www.vanderbilt.edu', factsheet:'', webinar:'' },
];

function renderUniCards() {
  return `<div class="uni-grid">${UNIVERSITIES.map(u => {
    const domain = u.site.replace('https://www.','').replace('https://','').split('/')[0];
    return `<div class="uni-card">
      <div class="uni-badge">
        <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" alt="${u.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" loading="lazy">
        <div class="uni-fallback" style="display:none">${u.abbr}</div>
      </div>
      <div class="uni-name">${u.name}</div>
      <div class="uni-links">
        <a class="uni-link" href="${u.site}" target="_blank" rel="noopener">🌐 Visit Website</a>
        ${u.factsheet ? `<a class="uni-link" href="${u.factsheet}" target="_blank" rel="noopener">📄 Factsheet</a>` : ''}
        ${u.webinar ? `<a class="uni-link" href="${u.webinar}" target="_blank" rel="noopener">🎥 Webinar</a>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── Content renderer ──
function toText(value) {
  if (value == null) return '';
  if (typeof value === 'string') return value;
  if (typeof value === 'number' || typeof value === 'boolean') return String(value);
  if (Array.isArray(value)) return value.map(toText).filter(Boolean).join(' ');
  if (typeof value === 'object') {
    for (const key of ['text', 'displayText', 'label', 'title', 'name', 'value']) {
      if (value[key] != null) return toText(value[key]);
    }
    if (value.url || value.href || value.linkUrl) return toText(value.url || value.href || value.linkUrl);
    if (Array.isArray(value.runs)) return value.runs.map(toText).join('');
    if (Array.isArray(value.links)) return value.links.map(link => toText(link.text || link.url || link.href || link.linkUrl)).filter(Boolean).join(' ');
  }
  return String(value);
}
function getUrls(value) {
  const urls = [];
  const addUrls = v => {
    const text = toText(v);
    const matches = text.match(/https?:\/\/[^\s<>"']+/gi) || [];
    matches.forEach(url => urls.push(stripUrlPunctuation(url)));
  };
  const walk = v => {
    if (v == null) return;
    if (typeof v === 'string') { addUrls(v); return; }
    if (Array.isArray(v)) { v.forEach(walk); return; }
    if (typeof v === 'object') {
      ['url', 'href', 'linkUrl'].forEach(key => { if (v[key]) addUrls(v[key]); });
      ['text', 'displayText', 'label', 'title', 'name', 'value'].forEach(key => { if (v[key]) walk(v[key]); });
      if (Array.isArray(v.runs)) walk(v.runs);
      if (Array.isArray(v.links)) walk(v.links);
    }
  };
  walk(value);
  return [...new Set(urls)];
}
function esc(s) { return toText(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// Strip leading section numbers from titles for display only
// (e.g. "1. Getting Started" -> "Getting Started", "2.1 Community Events" -> "Community Events")
// The Google Doc keeps the numbers so the Apps Script parser still works correctly.

  if (!el) return false;
  if (el.type === 'embed') return !!(el.url || toText(el.text).trim());

  if (el.type === 'list' || el.type === 'olist') {
    return (el.items || []).some(item => toText(item).trim());

  if (el.type === 'table') {

// ── State ──
let CATS = [];

// ── Build sidebar ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-header">Contents</div>';
  CATS.forEach((cat, ci) => {
    const catId = cat.id || `c${ci}`;
    html += `<button class="cat-btn" data-cat="${catId}" onclick="toggleCat('${catId}')">
      <span>${getCatIcon(cat.title)}</span> ${esc(stripNum(cat.title))}
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-sections" id="cat-${catId}">`;
    cat.sections.forEach((sec, si) => {
      const secId = sec.id || `${catId}s${si}`;
      html += `<a class="sec-btn" id="nav-${secId}" href="#${escAttr(sec.slug || secId)}" onclick="event.preventDefault(); showSection('${secId}')">${esc(stripNum(sec.title))}</a>`;
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

// ── Build panels ──
function buildPanels() {
  const c = document.getElementById('hb-content');
  let homeHtml = `<div class="content-panel active" id="panel-home">
    <h2>How can we help you?</h2>

  });

  let secHtml = '';

      secHtml += `<div class="content-panel" id="panel-${secId}" data-section-slug="${escAttr(slug)}">

// ── Navigation ──
function showHome(options = {}) {
  const updateUrl = options.updateUrl !== false;
  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sec-btn').forEach(b => { b.classList.remove('active'); b.style.display=''; });
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
  const home = document.getElementById('panel-home');
  if (home) home.classList.add('active');
  document.getElementById('hb-search').value = '';
  closeSearchResults();
  if (updateUrl) clearSectionHash();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function toggleCat(catId) {
  const btn = document.querySelector(`[data-cat="${catId}"]`);
  const sec = document.getElementById(`cat-${catId}`);
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
  if (!isOpen) { btn.classList.add('open'); sec.classList.add('open'); }
}

function showSection(secId, options = {}) {
  const updateUrl = options.updateUrl !== false;
  const shouldScroll = options.scroll !== false;
  const panel = document.getElementById(`panel-${secId}`);
  if (!panel) return false;

  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById(`nav-${secId}`);
  const catId = navBtn && navBtn.closest('.cat-sections') ? navBtn.closest('.cat-sections').id.replace(/^cat-/, '') : '';

  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
  if (catId) {
    document.querySelector(`[data-cat="${catId}"]`)?.classList.add('open');
    document.getElementById(`cat-${catId}`)?.classList.add('open');
  }

  panel.classList.add('active');
  if (navBtn) navBtn.classList.add('active');
  if (updateUrl) updateSectionHash(secId);
  if (shouldScroll) window.scrollTo({ top:0, behavior:'smooth' });
  return true;
}

function openCategory(catId) {
  toggleCat(catId);
  const idx = parseInt(catId.replace('c',''));
  const cat = CATS[idx];
  if (cat && cat.sections.length > 0) showSection(cat.sections[0].id || `${catId}s0`);
}

function openSectionFromHash() {
  const id = getSectionIdBySlug(getHashSlug());
  return id ? showSection(id, { updateUrl:false, scroll:false }) : false;
}

window.addEventListener('hashchange', () => {
  if (!CATS.length) return;
  if (!window.location.hash) {
    showHome({ updateUrl:false });
    return;
  }
  openSectionFromHash();
});

// ── Search ──
let hbSearchResults = [];

  return toText(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

    .filter(Boolean)
    .sort((a,b) => b.length - a.length)
    .forEach(term => {
      html = html.replace(new RegExp(`(${escapeRegExp(esc(term))})`, 'ig'), '<mark>$1</mark>');

  return html;

  const safeIdx = idx >= 0 ? idx : 0;
  const start = Math.max(0, safeIdx - 48);

}

  const results = [];

  CATS.forEach((cat, ci) => {
    cat.sections.forEach((sec, si) => {
      const id = sec.id || `c${ci}s${si}`;
      const title = stripNum(sec.title);
      const catTitle = stripNum(cat.title);
      const text = sectionSearchText(sec);
      const haystack = `${catTitle} ${title} ${text}`.toLowerCase();
      const navBtn = document.getElementById(`nav-${id}`);
      const matches = terms.every(term => haystack.includes(term));

      if (matches) {
        if (navBtn) navBtn.style.display = '';
        if (!firstMatch) firstMatch = id;

        let score = 0;
        const titleLower = title.toLowerCase();
        const catLower = catTitle.toLowerCase();
        const textLower = text.toLowerCase();
        if (titleLower.includes(qLower)) score += 90;
        if (catLower.includes(qLower)) score += 45;
        if (textLower.includes(qLower)) score += 25;
        terms.forEach(term => {
          if (titleLower.includes(term)) score += 30;
          if (catLower.includes(term)) score += 12;
          if (textLower.includes(term)) score += 5;
        });
        results.push({ id, title, catTitle, score, snippet: getSearchSnippet(text, q) });
      } else {
        if (navBtn) navBtn.style.display = 'none';
      }
    });
  });

  results.sort((a,b) => b.score - a.score || a.title.localeCompare(b.title));
  return { results: results.slice(0, 8), firstMatch };
}
function closeSearchResults() {
  hbSearchResults = [];
  hbSearchActiveIndex = -1;
  const box = document.getElementById('hb-search-results');
  const input = document.getElementById('hb-search');
  if (box) {
    box.classList.remove('open');
    box.innerHTML = '';
  }
  if (input) input.setAttribute('aria-expanded', 'false');
}
function setActiveSearchResult(index) {
  const buttons = document.querySelectorAll('.hb-search-result');
  if (!buttons.length) return;
  hbSearchActiveIndex = (index + buttons.length) % buttons.length;
  buttons.forEach((btn, i) => btn.classList.toggle('active', i === hbSearchActiveIndex));
  buttons[hbSearchActiveIndex].scrollIntoView({ block: 'nearest' });
}
function openSearchResult(id) {
  const match = id.match(/^c(\d+)s(\d+)$/);
  if (match) {
    const catId = `c${match[1]}`;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
    document.querySelector(`[data-cat="${catId}"]`)?.classList.add('open');
    document.getElementById(`cat-${catId}`)?.classList.add('open');
  }
  showSection(id);
  closeSearchResults();
}
function renderSearchResults(q, results) {
  const box = document.getElementById('hb-search-results');
  const input = document.getElementById('hb-search');
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  hbSearchResults = results;
  hbSearchActiveIndex = results.length ? 0 : -1;

  if (!q || q.length < 2) { closeSearchResults(); return; }
  input.setAttribute('aria-expanded', 'true');
  box.classList.add('open');
  if (!results.length) {
    box.innerHTML = '<div class="hb-search-empty">No matching handbook sections found.</div>';
    return;
  }

  box.innerHTML = results.map((result, i) => `
    <button class="hb-search-result ${i === 0 ? 'active' : ''}" type="button" data-search-id="${result.id}" role="option">
      <div class="hb-search-result-meta">${esc(result.catTitle)}</div>
      <div class="hb-search-result-title">${highlightSearchText(result.title, terms)}</div>
      <div class="hb-search-result-snippet">${highlightSearchText(result.snippet, terms)}</div>
    </button>
  `).join('');
  box.querySelectorAll('.hb-search-result').forEach(btn => {
    btn.addEventListener('click', () => openSearchResult(btn.dataset.searchId));
  });
}
function updateHandbookSearch() {
  const input = document.getElementById('hb-search');
  const q = input.value.trim();
  if (!q) { showHome(); return; }
  const search = rankedSearchResults(q);
  renderSearchResults(q, search.results);
  if (search.firstMatch) showSection(search.firstMatch, { updateUrl:false });
}

document.getElementById('hb-search').addEventListener('input', updateHandbookSearch);
document.getElementById('hb-search').addEventListener('keydown', e => {
  const open = document.getElementById('hb-search-results').classList.contains('open');
  if (!open) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); setActiveSearchResult(hbSearchActiveIndex + 1); }
  if (e.key === 'ArrowUp') { e.preventDefault(); setActiveSearchResult(hbSearchActiveIndex - 1); }
  if (e.key === 'Enter' && hbSearchResults[hbSearchActiveIndex]) {
    e.preventDefault();
    openSearchResult(hbSearchResults[hbSearchActiveIndex].id);
  }
  if (e.key === 'Escape') closeSearchResults();
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-inner')) closeSearchResults();
});
document.addEventListener('click', e => {
  const link = e.target.closest('[data-page-heading]');
  if (!link) return;
  e.preventDefault();
  scrollToPageHeading(link.dataset.pageHeading);
});

// ── Fetch and init ──
const loadingMsgs = [
  'Fetching handbook content…',
  'Reading the Google Doc…',
  'Parsing sections…',
  'Building navigation…',
  'Almost ready…'
];
async function init() {
  let msgIdx = 0;
  const msgEl = document.getElementById('loading-msg');
  const msgTimer = setInterval(() => {
    msgIdx = Math.min(msgIdx + 1, loadingMsgs.length - 1);
    if (msgEl) msgEl.textContent = loadingMsgs[msgIdx];
  }, 2000);
  try {
    const res = await fetch(API_URL + '?type=handbook');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    clearInterval(msgTimer);
    CATS = addSectionMetadata(pruneEmptySections(data.categories || []));
    buildSidebar();
    buildPanels();
    openSectionFromHash();
  } catch(e) {
    clearInterval(msgTimer);
    document.getElementById('sidebar').innerHTML = '<div class="sidebar-header">Contents</div>';
    document.getElementById('hb-content').innerHTML = `
      <div class="content-panel active">
        <h2>Unable to load handbook</h2>
        <div class="warning">Error: ${e.message}. Please try refreshing the page or contact your administrator.</div>
      </div>`;
  }
}

init();
</script>
