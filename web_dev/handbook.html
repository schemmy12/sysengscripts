<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Fellow Handbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
:root {
  --navy:#2F4166; --navy-dark:#1a2744; --bright-blue:#235EA0;
  --teal:#80C3C4; --gold:#f7cb47; --off-white:#F6F5F0;
  --light-bg:#f0f2f5; --border:#dde2ea; --text:#2F4166; --muted:#5a6a85;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--off-white);color:var(--text);}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,#235EA0 0%,#2F4166 100%);position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 80px);}
.hero-inner{max-width:1100px;margin:0 auto;padding:0 20px;}
.hero-nav{display:table;width:100%;table-layout:fixed;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1;}
.hero-nav-left{display:table-cell;width:20%;vertical-align:middle;padding:24px 16px;text-align:left;}
.hero-nav-center{display:table-cell;width:60%;vertical-align:middle;padding:24px 0;text-align:center;}
.hero-nav-right{display:table-cell;width:20%;vertical-align:middle;padding:24px 16px;text-align:right;}
.hero-logo{display:inline-flex;align-items:center;text-decoration:none;}
.logo-icon{width:120px;height:64px;flex-shrink:0;}
.logo-icon svg{width:100%;height:100%;}
.hero-nav-center a{color:#fff;font-size:17px;text-decoration:none;font-weight:500;font-family:'Poppins',sans-serif;letter-spacing:.2px;white-space:nowrap;margin:0 14px;transition:opacity .15s;}
.hero-nav-center a:hover{opacity:.75;}
.hero-nav-center a.active{border-bottom:2px solid var(--gold);padding-bottom:2px;}
.hero-body{padding:24px 0 36px;position:relative;z-index:1;}
.hero-title{font-size:42px;font-weight:800;color:var(--gold);font-family:'Poppins',sans-serif;line-height:1.1;font-style:italic;letter-spacing:-.5px;padding-left:16px;}

/* ── Search ── */
.search-wrap{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;}
.search-inner{max-width:1100px;margin:0 auto;}
.search-row{display:flex;align-items:center;gap:10px;border:2px solid var(--navy);border-radius:12px;padding:10px 16px;background:#fff;}
.search-row input{flex:1;border:none;outline:none;font-size:14px;color:var(--text);font-family:'Poppins',sans-serif;}
.search-row input::placeholder{color:var(--muted);}
.search-row svg{color:var(--navy);flex-shrink:0;}

/* ── Layout ── */
.handbook-layout{max-width:1100px;margin:0 auto;padding:24px 20px 60px;display:flex;gap:24px;align-items:flex-start;}

/* ── Sidebar ── */
.sidebar{width:256px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;}
.sidebar-header{padding:14px 16px 10px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif;text-align:left;transition:background .15s;}
.cat-btn:hover{background:var(--light-bg);}
.cat-btn.open{background:#eef2ff;color:var(--bright-blue);}
.cat-chevron{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--muted);}
.cat-btn.open .cat-chevron{transform:rotate(180deg);}
.cat-sections{display:none;}
.cat-sections.open{display:block;}
.sec-btn{display:block;width:100%;padding:8px 16px 8px 28px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;color:var(--muted);font-family:'Poppins',sans-serif;text-align:left;line-height:1.4;transition:all .15s;}
.sec-btn:hover{color:var(--navy);background:#f4f7ff;}
.sec-btn.active{color:var(--bright-blue);font-weight:600;background:#e8f0ff;border-left:3px solid var(--bright-blue);padding-left:25px;}

/* ── Content ── */
.handbook-content{flex:1;min-width:0;}
.content-panel{display:none;background:#fff;border:1px solid var(--border);border-radius:10px;padding:32px 36px;}
.content-panel.active{display:block;}
.content-panel h2{font-size:21px;font-weight:800;color:var(--navy);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--gold);line-height:1.3;}
.content-panel h3{font-size:15px;font-weight:700;color:var(--navy);margin:22px 0 10px;}
.content-panel h4{font-size:14px;font-weight:600;color:var(--bright-blue);margin:16px 0 8px;}
.content-panel p{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:12px;}
.content-panel ul,.content-panel ol{padding-left:22px;margin-bottom:14px;}
.content-panel li{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:6px;}
.content-panel a{color:var(--bright-blue);text-decoration:none;}
.content-panel a:hover{text-decoration:underline;}
.content-panel strong{font-weight:600;}
.note{background:#fef9e7;border-left:4px solid var(--gold);padding:12px 16px;border-radius:0 6px 6px 0;margin:14px 0;font-size:13px;line-height:1.7;}
.warning{background:#fff3f3;border-left:4px solid #e74c3c;padding:12px 16px;border-radius:0 6px 6px 0;margin:14px 0;font-size:13px;line-height:1.7;}
.img-ph{background:var(--light-bg);border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;color:var(--muted);font-size:13px;margin:14px 0;}
.embed-ph{background:#eef3ff;border:2px dashed #b3c6f0;border-radius:8px;padding:20px;text-align:center;color:var(--bright-blue);font-size:13px;margin:14px 0;}
.table-ph{background:#f0fff4;border:2px dashed #a3d9b0;border-radius:8px;padding:20px;text-align:center;color:#2d7a4a;font-size:13px;margin:14px 0;}

/* ── Home landing ── */
.handbook-home{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .15s;text-align:center;}
.cat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);}
.cat-card-icon{font-size:28px;margin-bottom:10px;}
.cat-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.cat-card-desc{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── Loading ── */
.hb-loading{text-align:center;padding:80px 20px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .handbook-layout{flex-direction:column;}
  .sidebar{width:100%;position:static;max-height:none;}
  .hero-nav-center{display:none;}
  .hero-title{font-size:34px;}
  .handbook-home{grid-template-columns:1fr 1fr;}
  .content-panel{padding:20px;}
}
</style>
</head>
<body>

<!-- ── Hero ── -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-nav">
      <div class="hero-nav-left">
        <a class="hero-logo" href="index.html">
          <div class="logo-icon">
            <svg viewBox="0 0 110 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="28" y1="2" x2="28" y2="10" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="28" y1="54" x2="28" y2="62" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="2" y1="32" x2="10" y2="32" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="46" y1="32" x2="54" y2="32" stroke="#f7cb47" stroke-width="3" stroke-linecap="round"/>
              <line x1="8" y1="12" x2="14" y2="18" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="48" y1="12" x2="42" y2="18" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="8" y1="52" x2="14" y2="46" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="48" y1="52" x2="42" y2="46" stroke="#f7cb47" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(22.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(67.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(112.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(157.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(202.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(247.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(292.5 28 32)"/>
              <line x1="28" y1="2" x2="28" y2="8" stroke="#f7cb47" stroke-width="2" stroke-linecap="round" transform="rotate(337.5 28 32)"/>
              <text x="18" y="43" fill="white" font-size="28" font-weight="900" font-family="Arial Black, Arial" letter-spacing="1">RISE</text>
            </svg>
          </div>
        </a>
      </div>
      <div class="hero-nav-right"></div>
    </div>
    <div class="hero-body">
      <div class="hero-title">Rise Fellow Handbook</div>
    </div>
  </div>
</div>

<!-- ── Search ── -->
<div class="search-wrap">
  <div class="search-inner">
    <div class="search-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="hb-search" type="text" placeholder="Search the handbook…">
    </div>
  </div>
</div>

<!-- ── Layout ── -->
<div class="handbook-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">Contents</div>
    <div class="hb-loading"><div class="spinner"></div>Loading…</div>
  </aside>
  <main class="handbook-content" id="hb-content">
    <div class="content-panel active" id="panel-loading">
      <div class="hb-loading"><div class="spinner"></div><p>Loading handbook…</p></div>
    </div>
  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWpy7prAGQ13eOeXIOZoUfIsZ_yynbAQar33rthMfnYs4J01fXnZknhdphSR1yMnuK/exec";

// Icon map — matched by category title keyword
const ICON_MAP = {
  'getting started': '🏠',
  'programming': '🌐',
  'applying': '🎓',
  'css': '📋',
  'attending': '🏫',
  'safeguarding': '🛡️',
  'wellbeing': '🛡️',
  'postgraduate': '🎯'
};

function getCatIcon(title) {
  const t = title.toLowerCase();
  for (const [key, icon] of Object.entries(ICON_MAP)) {
    if (t.includes(key)) return icon;
  }
  return '📄';
}

function getCatDesc(title) {
  const t = title.toLowerCase();
  if (t.includes('getting')) return 'Benefits, code of conduct, funding, and program policies.';
  if (t.includes('programming')) return 'Community events, network building opportunities, and the Innovation Fund.';
  if (t.includes('applying')) return 'College advising, university partners, and financial aid guidance.';
  if (t.includes('css')) return 'How to complete the CSS Profile for Rise higher education funding.';
  if (t.includes('attending')) return 'Higher education funding details, accommodation, and US immigration guidance.';
  if (t.includes('safeguard') || t.includes('wellbeing')) return 'Safeguarding policy, wellbeing support, and hardship funding.';
  if (t.includes('postgraduate')) return 'Graduate education funding, external scholarships, and post-graduation support.';
  return '';
}

// ── Content renderer ──
function renderContent(content) {
  return content.map(el => {
    if (el.type === 'h3') return `<h3>${esc(el.text)}</h3>`;
    if (el.type === 'h4') return `<h4>${esc(el.text)}</h4>`;
    if (el.type === 'embed') return `<div class="embed-ph">📊 [Embedded Resource: ${esc(el.text)}]</div>`;
    if (el.type === 'image') return `<div class="img-ph">📸 ${esc(el.text)}</div>`;
    if (el.type === 'table') return `<div class="table-ph">📊 ${esc(el.text)}</div>`;
    if (el.type === 'list' || el.type === 'olist') {
      const tag = el.type === 'olist' ? 'ol' : 'ul';
      const items = el.items.map(item => {
        const indent = item.level > 0 ? ` style="margin-left:${item.level * 16}px"` : '';
        return `<li${indent}>${esc(item.text)}</li>`;
      }).join('');
      return `<${tag}>${items}</${tag}>`;
    }
    if (el.type === 'p') {
      const t = el.text;
      // Detect note/warning patterns
      if (/^(please note|note:|important:|rise reserves|a portion or all)/i.test(t)) {
        return `<div class="note">${esc(t)}</div>`;
      }
      if (/^(warning|do not|please do not|PLEASE DO NOT|if your b4b card is lost)/i.test(t)) {
        return `<div class="warning">${esc(t)}</div>`;
      }
      return `<p>${esc(t)}</p>`;
    }
    return '';
  }).join('');
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── State ──
let CATS = [];

// ── Build sidebar ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-header">Contents</div>';
  CATS.forEach((cat, ci) => {
    html += `<button class="cat-btn" data-cat="c${ci}" onclick="toggleCat('c${ci}')">
      <span>${getCatIcon(cat.title)}</span> ${esc(cat.title)}
      <span class="cat-chevron">▼</span>
    </button>
    <div class="cat-sections" id="cat-c${ci}">`;
    cat.sections.forEach((sec, si) => {
      html += `<button class="sec-btn" id="nav-c${ci}s${si}" onclick="showSection('c${ci}s${si}')">${esc(sec.title)}</button>`;
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

// ── Build panels ──
function buildPanels() {
  const c = document.getElementById('hb-content');
  let homeHtml = `<div class="content-panel active" id="panel-home">
    <h2>How can we help you?</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">Browse a section below or use the search bar to find specific information.</p>
    <div class="handbook-home">`;
  CATS.forEach((cat, ci) => {
    homeHtml += `<div class="cat-card" onclick="openCategory('c${ci}')">
      <div class="cat-card-icon">${getCatIcon(cat.title)}</div>
      <div class="cat-card-title">${esc(cat.title)}</div>
      <div class="cat-card-desc">${getCatDesc(cat.title)}</div>
    </div>`;
  });
  homeHtml += '</div></div>';

  let secHtml = '';
  CATS.forEach((cat, ci) => {
    cat.sections.forEach((sec, si) => {
      secHtml += `<div class="content-panel" id="panel-c${ci}s${si}">
        <h2>${esc(sec.title)}</h2>
        ${renderContent(sec.content)}
      </div>`;
    });
  });
  c.innerHTML = homeHtml + secHtml;
}

// ── Navigation ──
function showHome() {
  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sec-btn').forEach(b => { b.classList.remove('active'); b.style.display = ''; });
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
  const home = document.getElementById('panel-home');
  if (home) home.classList.add('active');
  document.getElementById('hb-search').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCat(catId) {
  const btn = document.querySelector(`[data-cat="${catId}"]`);
  const sec = document.getElementById(`cat-${catId}`);
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-sections').forEach(s => s.classList.remove('open'));
  if (!isOpen) { btn.classList.add('open'); sec.classList.add('open'); }
}

function showSection(secId) {
  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById(`panel-${secId}`);
  const navBtn = document.getElementById(`nav-${secId}`);
  if (panel) panel.classList.add('active');
  if (navBtn) navBtn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openCategory(catId) {
  toggleCat(catId);
  const idx = parseInt(catId.replace('c',''));
  const cat = CATS[idx];
  if (cat && cat.sections.length > 0) showSection(`${catId}s0`);
}

// ── Search ──
document.getElementById('hb-search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { showHome(); return; }
  let firstMatch = null;
  CATS.forEach((cat, ci) => {
    cat.sections.forEach((sec, si) => {
      const text = (sec.title + ' ' + sec.content.map(e => e.text || (e.items||[]).map(i=>i.text).join(' ')).join(' ')).toLowerCase();
      const id = `c${ci}s${si}`;
      const navBtn = document.getElementById(`nav-${id}`);
      if (text.includes(q)) {
        if (navBtn) navBtn.style.display = '';
        if (!firstMatch) firstMatch = id;
      } else {
        if (navBtn) navBtn.style.display = 'none';
      }
    });
  });
  if (firstMatch) showSection(firstMatch);
});

// ── Fetch and init ──
async function init() {
  try {
    const res = await fetch(API_URL + '?type=handbook');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    CATS = data.categories || [];
    buildSidebar();
    buildPanels();
  } catch(e) {
    document.getElementById('sidebar').innerHTML = '<div class="sidebar-header">Contents</div>';
    document.getElementById('hb-content').innerHTML = `
      <div class="content-panel active">
        <h2>Unable to load handbook</h2>
        <div class="warning">Error: ${e.message}. Please try refreshing the page or contact your administrator.</div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
