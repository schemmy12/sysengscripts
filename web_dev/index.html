<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Directory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Google Sans', Arial, sans-serif; background: #f8f9fa; color: #202124; }

  .top-bar {
    background: #fff;
    padding: 16px 20px;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #5f6368;
  }
  #search {
    width: 100%;
    padding: 9px 12px 9px 38px;
    border: 1px solid #dadce0;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  #search:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.15); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid #dadce0;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    color: #3c4043;
  }
  .filter-btn:hover { background: #f1f3f4; }
  .filter-btn.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; font-weight: 500; }

  .count { font-size: 13px; color: #5f6368; padding: 4px 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    padding: 20px;
    text-align: center;
    transition: box-shadow .2s, transform .2s;
    cursor: default;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.12); transform: translateY(-2px); }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    background: #1a73e8;
  }

  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-title { font-size: 13px; color: #5f6368; margin-bottom: 4px; }
  .card-dept {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: #e8f0fe;
    color: #1a73e8;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .card-links { display: flex; justify-content: center; gap: 10px; }
  .card-links a {
    font-size: 12px;
    color: #1a73e8;
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid #dadce0;
    border-radius: 14px;
    transition: background .15s;
  }
  .card-links a:hover { background: #f1f3f4; }

  .empty { text-align: center; padding: 60px 20px; color: #5f6368; grid-column: 1/-1; }
  .empty svg { margin-bottom: 12px; opacity: .4; }

  /* Avatar color palette */
  .c0{background:#1a73e8} .c1{background:#34a853} .c2{background:#ea4335}
  .c3{background:#fbbc04;color:#202124} .c4{background:#9334e6}
  .c5{background:#00897b} .c6{background:#e67c00} .c7{background:#c2185b}
</style>
</head>
<body>

<div class="top-bar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search by name, title, or department…">
  </div>
  <div class="filters" id="filters"></div>
</div>

<div style="padding: 10px 20px 0;">
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<script>
// ─── EDIT YOUR DIRECTORY DATA HERE ───────────────────────────────────────────
const people = [
  { name:"Alex Rivera",     title:"Executive Director",        dept:"Leadership",    email:"alex@org.org",   location:"New York, NY" },
  { name:"Jordan Kim",      title:"Programs Manager",          dept:"Programs",      email:"jordan@org.org", location:"Chicago, IL" },
  { name:"Sam Okafor",      title:"Community Coordinator",     dept:"Programs",      email:"sam@org.org",    location:"Atlanta, GA" },
  { name:"Taylor Brooks",   title:"Development Officer",       dept:"Development",   email:"taylor@org.org", location:"Boston, MA" },
  { name:"Morgan Lee",      title:"Communications Lead",       dept:"Comms",         email:"morgan@org.org", location:"Los Angeles, CA" },
  { name:"Casey Patel",     title:"Operations Manager",        dept:"Operations",    email:"casey@org.org",  location:"Houston, TX" },
  { name:"Drew Nguyen",     title:"Data & Impact Analyst",     dept:"Programs",      email:"drew@org.org",   location:"San Francisco, CA" },
  { name:"Jamie Flores",    title:"Finance Manager",           dept:"Operations",    email:"jamie@org.org",  location:"Miami, FL" },
  { name:"Robin Zhao",      title:"Senior Program Officer",    dept:"Programs",      email:"robin@org.org",  location:"Seattle, WA" },
  { name:"Quinn Adams",     title:"Partnership Manager",       dept:"Development",   email:"quinn@org.org",  location:"Denver, CO" },
  { name:"Avery Martin",    title:"HR Coordinator",            dept:"Operations",    email:"avery@org.org",  location:"Austin, TX" },
  { name:"Sage Thompson",   title:"Digital Content Manager",   dept:"Comms",         email:"sage@org.org",   location:"Portland, OR" },
];
// ─────────────────────────────────────────────────────────────────────────────

const colors = ['c0','c1','c2','c3','c4','c5','c6','c7'];
const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase();
const colorFor = n => colors[n.charCodeAt(0) % colors.length];

const depts = ['All', ...new Set(people.map(p => p.dept))];
let active = 'All', query = '';

// Build filter buttons
const filtersEl = document.getElementById('filters');
depts.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (d === 'All' ? ' active' : '');
  btn.textContent = d;
  btn.onclick = () => {
    active = d;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  filtersEl.appendChild(btn);
});

function render() {
  const q = query.toLowerCase();
  const filtered = people.filter(p => {
    const matchDept = active === 'All' || p.dept === active;
    const matchQ = !q || [p.name, p.title, p.dept, p.location].some(v => v.toLowerCase().includes(q));
    return matchDept && matchQ;
  });

  document.getElementById('count').textContent =
    filtered.length === people.length
      ? `${people.length} members`
      : `${filtered.length} of ${people.length} members`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No results for "<strong>${query}</strong>"</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="avatar ${colorFor(p.name)}">${initials(p.name)}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-dept">${p.dept}</div>
      <div style="font-size:12px;color:#80868b;margin-bottom:12px">📍 ${p.location}</div>
      <div class="card-links">
        <a href="mailto:${p.email}">✉ Email</a>
      </div>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

render();
</script>
</body>
</html>
