<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Fellows Directory</title>
<style>
  :root {
    --navy: #1a2744;
    --teal: #0099a8;
    --gold: #f5a623;
    --light-bg: #f7f8fa;
    --border: #e2e5ea;
    --text: #333;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: var(--text); }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }

  /* ── Toolbar ── */
  .toolbar {
    background: #fff;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  .search-row {
    display: flex; align-items: center; gap: 10px;
    border: 1.5px solid var(--navy); border-radius: 6px;
    padding: 11px 16px; margin-bottom: 12px; background: #fff;
  }
  .search-row input {
    flex: 1; border: none; outline: none;
    font-size: 14px; color: var(--text);
  }
  .search-row svg { color: var(--navy); flex-shrink: 0; }

  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-wrap {
    display: flex; align-items: center; gap: 6px;
    border: 1.5px solid var(--border); border-radius: 6px;
    padding: 8px 12px; background: #fff; flex: 1; min-width: 140px;
    transition: border-color .15s;
  }
  .filter-wrap:focus-within { border-color: var(--navy); }
  .filter-wrap svg { color: var(--navy); flex-shrink: 0; }
  .filter-wrap select {
    border: none; outline: none; font-size: 13px;
    color: var(--text); background: transparent;
    cursor: pointer; flex: 1; appearance: none;
    font-weight: 500;
  }

  /* ── Meta ── */
  .meta { padding: 10px 16px; font-size: 13px; color: var(--muted); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  /* ── Card ── */
  .card {
    background: #fff;
    display: flex;
    flex-direction: row;
    cursor: pointer;
    transition: background .15s;
    padding: 20px 24px;
    gap: 18px;
    align-items: flex-start;
    min-height: 140px;
  }
  .card:hover { background: #f9fafb; }

  .card-photo-wrap {
    position: relative;
    flex-shrink: 0;
    width: 120px;
    height: 130px;
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top;
    display: block;
  }
  .card-img-placeholder {
    width: 100%; height: 100%;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #fff;
  }
  .card-flag {
    position: absolute;
    top: 5px; right: 5px;
    font-size: 18px;
    line-height: 1;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
  }

  .card-body {
    flex: 1; min-width: 0;
    padding-top: 4px;
  }
  .card-country-code {
    font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: .5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .card-name {
    font-size: 16px; font-weight: 700;
    color: var(--navy); margin-bottom: 5px;
    line-height: 1.3;
  }
  .card-cohort {
    font-size: 13px; color: var(--muted); margin-bottom: 12px;
  }
  .card-cohort span { color: var(--teal); font-weight: 600; }
  .card-email {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: var(--text);
  }
  .email-icon {
    width: 22px; height: 22px; border-radius: 3px;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .email-icon svg { color: #fff; }

  /* ── Pagination ── */
  .pagination {
    display: flex; justify-content: center; align-items: center;
    gap: 4px; padding: 20px 16px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    width: 32px; height: 32px; border-radius: 4px;
    border: 1px solid var(--border); background: #fff;
    font-size: 13px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .page-btn:hover { background: var(--light-bg); }
  .page-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .page-btn:disabled { opacity: .4; cursor: default; }

  /* ── Modal ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 999;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 6px;
    max-width: 720px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    position: relative; display: flex; flex-wrap: wrap;
  }

  .modal-left {
    width: 220px; flex-shrink: 0;
    padding: 24px 20px 24px 24px;
  }
  .modal-photo {
    width: 180px; height: 200px;
    object-fit: cover; object-position: top;
    border-radius: 3px; margin-bottom: 14px;
  }
  .modal-photo-placeholder {
    width: 180px; height: 200px;
    border-radius: 3px; margin-bottom: 14px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: 700; color: #fff;
  }
  .modal-name { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .modal-email-row {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text);
  }

  .modal-right {
    flex: 1; min-width: 260px;
    padding: 24px 28px 24px 12px;
    border-left: 1px solid var(--border);
  }
  .modal-country-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; font-size: 14px; font-weight: 700;
    color: var(--muted); letter-spacing: .5px;
  }
  .modal-flag { font-size: 22px; }
  .modal-cohort {
    font-size: 15px; font-weight: 700; margin-bottom: 14px;
    color: var(--navy);
  }
  .modal-cohort .winner-label { color: var(--gold); margin-left: 6px; font-weight: 700; }
  .modal-bio { font-size: 13px; line-height: 1.7; color: var(--text); margin-bottom: 16px; }
  .modal-field { font-size: 13px; margin-bottom: 8px; color: var(--text); }
  .modal-field strong { color: var(--navy); }
  .modal-field a { color: var(--teal); text-decoration: none; }
  .modal-field a:hover { text-decoration: underline; }

  .close-btn {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 20px;
    cursor: pointer; color: var(--muted); line-height: 1;
  }
  .close-btn:hover { color: #000; }

  /* ── Status ── */
  .status { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .modal-left { width: 100%; padding-bottom: 0; }
    .modal-right { border-left: none; border-top: 1px solid var(--border); padding: 16px 20px; }
  }
</style>
</head>
<body>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWpy7prAGQ13eOeXIOZoUfIsZ_yynbAQar33rthMfnYs4J01fXnZknhdphSR1yMnuK/exec";
const PAGE_SIZE = 20;
</script>

<div class="container">
<div class="toolbar">
  <div class="search-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search by Name, Cohort Year, Current Location, Countries Represented…">
  </div>
  <div class="filter-row">
    <div class="filter-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <select id="f-year"><option value="">Cohort Year</option></select>
    </div>
    <div class="filter-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <select id="f-location"><option value="">Current Location</option></select>
    </div>
    <div class="filter-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      <select id="f-country"><option value="">Countries Represented</option></select>
    </div>
  </div>
</div>

<div class="meta" id="meta"></div>
<div class="grid" id="grid">
  <div class="status"><div class="spinner"></div>Loading directory…</div>
</div>
<div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-left">
      <div id="m-photo"></div>
      <div class="modal-name" id="m-name"></div>
      <div class="modal-email-row">
        <div class="email-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
        <span id="m-email"></span>
      </div>
    </div>
    <div class="modal-right">
      <div class="modal-country-row">
        <span class="modal-flag" id="m-flag"></span>
        <span id="m-country"></span>
      </div>
      <div class="modal-cohort" id="m-cohort"></div>
      <div class="modal-bio" id="m-bio"></div>
      <div class="modal-field" id="m-represented"></div>
      <div class="modal-field" id="m-home"></div>
      <div class="modal-field" id="m-pronouns"></div>
      <div class="modal-field" id="m-linkedin"></div>
    </div>
  </div>
</div>

<script>
const countryToCode = {
  "afghanistan":"AF","albania":"AL","algeria":"DZ","angola":"AO","argentina":"AR",
  "armenia":"AM","australia":"AU","austria":"AT","azerbaijan":"AZ","bahrain":"BH",
  "bangladesh":"BD","belarus":"BY","belgium":"BE","benin":"BJ","bhutan":"BT",
  "bolivia":"BO","botswana":"BW","brazil":"BR","bulgaria":"BG","burkina faso":"BF",
  "burundi":"BI","cambodia":"KH","cameroon":"CM","canada":"CA","chile":"CL",
  "china":"CN","colombia":"CO","congo":"CG","costa rica":"CR","croatia":"HR",
  "cuba":"CU","czech republic":"CZ","denmark":"DK","ecuador":"EC","egypt":"EG",
  "el salvador":"SV","ethiopia":"ET","finland":"FI","france":"FR","georgia":"GE",
  "germany":"DE","ghana":"GH","greece":"GR","guatemala":"GT","guinea":"GN",
  "haiti":"HT","honduras":"HN","hungary":"HU","india":"IN","indonesia":"ID",
  "iran":"IR","iraq":"IQ","ireland":"IE","israel":"IL","italy":"IT","jamaica":"JM",
  "japan":"JP","jordan":"JO","kazakhstan":"KZ","kenya":"KE","kosovo":"XK",
  "kyrgyzstan":"KG","latvia":"LV","lebanon":"LB","liberia":"LR","libya":"LY",
  "lithuania":"LT","madagascar":"MG","malawi":"MW","malaysia":"MY","mali":"ML",
  "mauritania":"MR","mexico":"MX","moldova":"MD","mongolia":"MN","morocco":"MA",
  "mozambique":"MZ","myanmar":"MM","namibia":"NA","nepal":"NP","netherlands":"NL",
  "new zealand":"NZ","nicaragua":"NI","nigeria":"NG","north macedonia":"MK",
  "norway":"NO","pakistan":"PK","palestine":"PS","panama":"PA","paraguay":"PY",
  "peru":"PE","philippines":"PH","poland":"PL","portugal":"PT","romania":"RO",
  "russia":"RU","rwanda":"RW","saudi arabia":"SA","senegal":"SN","serbia":"RS",
  "sierra leone":"SL","singapore":"SG","slovakia":"SK","somalia":"SO",
  "south africa":"ZA","south korea":"KR","south sudan":"SS","spain":"ES",
  "sri lanka":"LK","sudan":"SD","sweden":"SE","switzerland":"CH","syria":"SY",
  "taiwan":"TW","tajikistan":"TJ","tanzania":"TZ","thailand":"TH","togo":"TG",
  "tunisia":"TN","turkey":"TR","turkmenistan":"TM","uganda":"UG","ukraine":"UA",
  "united arab emirates":"AE","united kingdom":"GB","united states":"US","uruguay":"UY",
  "uzbekistan":"UZ","venezuela":"VE","vietnam":"VN","yemen":"YE","zambia":"ZM","zimbabwe":"ZW"
};

function flagEmoji(country) {
  if (!country) return "🌍";
  const str = Array.isArray(country) ? country[0] : country;
  if (!str) return "🌍";
  const code = countryToCode[str.toLowerCase().trim()];
  if (!code) return "🌍";
  return [...code].map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))).join('');
}

function initials(name) {
  return (name||"?").split(" ").filter(Boolean).map(w=>w[0]).join("").toUpperCase().slice(0,2);
}

function photoImg(url, cls, phCls, name) {
  if (url) return `<img class="${cls}" src="${url}" alt="${name}" onerror="this.outerHTML='<div class=\\'${phCls}\\'>${initials(name)}</div>'" loading="lazy">`;
  return `<div class="${phCls}">${initials(name)}</div>`;
}

let allPeople = [], filtered = [], currentPage = 1;

function populateFilter(id, values) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  [...sel.options].slice(1).forEach(o => o.remove());
  [...new Set(values.filter(Boolean).sort())].forEach(v => {
    const o = document.createElement("option");
    o.value = o.textContent = v;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

function buildFilters(people) {
  populateFilter("f-location", people.map(p => p.country));
  populateFilter("f-country",  people.map(p => p.countries));
  populateFilter("f-year",     people.map(p => String(p.year)));
}

function applyFilters() {
  const q   = document.getElementById("search").value.toLowerCase();
  const loc = document.getElementById("f-location").value;
  const cty = document.getElementById("f-country").value;
  const yr  = document.getElementById("f-year").value;

  filtered = allPeople.filter(p => {
    const mQ   = !q   || [p.name, p.bio, p.country, p.city, p.countries, String(p.year)].some(v => (v||"").toLowerCase().includes(q));
    const mLoc = !loc || p.country === loc;
    const mCty = !cty || p.countries === cty;
    const mYr  = !yr  || String(p.year) === yr;
    return mQ && mLoc && mCty && mYr;
  });
  currentPage = 1;
  renderGrid();
}

function renderGrid() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById("meta").textContent =
    total === allPeople.length ? `${allPeople.length} Fellows` : `${total} of ${allPeople.length} Fellows`;

  const grid = document.getElementById("grid");
  if (!slice.length) {
    grid.innerHTML = `<div class="status">No results found.</div>`;
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  grid.innerHTML = slice.map((p, i) => `
    <div class="card" data-i="${start+i}" tabindex="0">
      <div class="card-photo-wrap">
        ${photoImg(p.photo, "card-img", "card-img-placeholder", p.name)}
        <span class="card-flag">${flagEmoji(p.countries||p.country)}</span>
      </div>
      <div class="card-body">
        <div class="card-country-code">${countryToCode[(p.countries||p.country||"").split(",")[0].toLowerCase().trim()]||""}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-cohort">Cohort: <span>${p.year}</span></div>
        ${p.email ? `<div class="card-email">
          <div class="email-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <span>${p.email}</span>
        </div>` : ""}
      </div>
    </div>
  `).join("");

  grid.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", () => openModal(filtered[+el.dataset.i]));
    el.addEventListener("keydown", e => e.key === "Enter" && openModal(filtered[+el.dataset.i]));
  });

  renderPagination(pages);
}

function renderPagination(pages) {
  const el = document.getElementById("pagination");
  if (pages <= 1) { el.innerHTML = ""; return; }
  let html = `<button class="page-btn" id="prev" ${currentPage===1?"disabled":""}>&#8249;</button>`;
  for (let i = 1; i <= pages; i++)
    html += `<button class="page-btn ${i===currentPage?"active":""}" data-p="${i}">${i}</button>`;
  html += `<button class="page-btn" id="next" ${currentPage===pages?"disabled":""}>&#8250;</button>`;
  el.innerHTML = html;
  el.querySelector("#prev")?.addEventListener("click", () => { currentPage--; renderGrid(); window.scrollTo(0,0); });
  el.querySelector("#next")?.addEventListener("click", () => { currentPage++; renderGrid(); window.scrollTo(0,0); });
  el.querySelectorAll("[data-p]").forEach(btn =>
    btn.addEventListener("click", () => { currentPage = +btn.dataset.p; renderGrid(); window.scrollTo(0,0); })
  );
}

function openModal(p) {
  document.getElementById("m-photo").innerHTML    = photoImg(p.photo, "modal-photo", "modal-photo-placeholder", p.name);
  document.getElementById("m-name").textContent   = p.name;
  document.getElementById("m-email").textContent  = p.email;
  document.getElementById("m-flag").textContent   = flagEmoji(p.countries||p.country);
  document.getElementById("m-country").textContent = (p.countries||p.country||"").toUpperCase();
  document.getElementById("m-cohort").innerHTML   = `${p.year} <span class="winner-label">RISE FELLOW</span>`;
  document.getElementById("m-bio").textContent    = p.bio||"";
  document.getElementById("m-represented").innerHTML = p.countries ? `<strong>Countries Represented:</strong> ${p.countries}` : "";
  document.getElementById("m-home").innerHTML     = p.country ? `<strong>Current Location:</strong> ${[p.city, p.country].filter(Boolean).join(", ")}` : "";
  document.getElementById("m-pronouns").innerHTML = p.pronouns ? `<strong>Pronouns:</strong> ${p.pronouns}` : "";
  document.getElementById("m-linkedin").innerHTML = p.linkedin ? `<strong>LinkedIn:</strong> <a href="${p.linkedin}" target="_blank" rel="noopener">${p.linkedin}</a>` : "";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e => { if (e.target === document.getElementById("overlay")) closeModal(); });
document.addEventListener("keydown", e => e.key === "Escape" && closeModal());
["search","f-location","f-country","f-year"].forEach(id =>
  document.getElementById(id).addEventListener("input", applyFilters)
);

async function init() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allPeople = data.records.filter(p => p.name);
    filtered  = [...allPeople];
    buildFilters(allPeople);
    renderGrid();
  } catch(e) {
    document.getElementById("grid").innerHTML = `<div class="status">❌ Could not load directory. Error: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
