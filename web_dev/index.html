<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Fellows Directory</title>
<style>
  /* ── SWAP THIS URL with your published Google Sheets CSV link ── */
  :root { --teal: #1a7a6e; --navy: #1a2744; --gold: #c9a84c; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }

  /* Search & Filters */
  .toolbar {
    background: #fff;
    padding: 14px 16px;
    border-bottom: 1px solid #ddd;
    position: sticky; top: 0; z-index: 100;
  }
  .search-row {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid #ccc; border-radius: 4px;
    padding: 8px 12px; margin-bottom: 10px;
    background: #fff;
  }
  .search-row input {
    flex: 1; border: none; outline: none;
    font-size: 14px; color: #333;
  }
  .search-row svg { color: #888; flex-shrink: 0; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  select {
    padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 13px; background: #fff; color: #333; cursor: pointer;
    min-width: 150px;
  }

  /* Count */
  .meta { padding: 8px 16px; font-size: 13px; color: #666; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; padding: 16px;
  }

  /* Card */
  .card {
    background: #fff; border-radius: 6px;
    overflow: hidden; cursor: pointer;
    border: 1px solid #e0e0e0;
    transition: box-shadow .2s, transform .15s;
    display: flex; flex-direction: column;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); }

  .card-img {
    width: 100%; aspect-ratio: 1/1;
    object-fit: cover; object-position: top;
    background: #ddd; display: block;
  }
  .card-img-placeholder {
    width: 100%; aspect-ratio: 1/1;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700; color: #fff;
  }

  .card-body { padding: 12px; flex: 1; }
  .card-flag { font-size: 18px; margin-bottom: 4px; }
  .card-name { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
  .card-cohort { font-size: 12px; color: #666; margin-bottom: 6px; }
  .card-cohort span { color: var(--teal); font-weight: 600; }
  .card-email { font-size: 12px; color: var(--teal); word-break: break-all; }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 999;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff; border-radius: 8px;
    max-width: 780px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    position: relative; display: flex;
    flex-wrap: wrap;
  }

  .modal-left {
    width: 240px; flex-shrink: 0;
    padding: 24px 20px 24px 24px;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .modal-photo {
    width: 200px; height: 220px;
    object-fit: cover; object-position: top;
    border-radius: 4px; margin-bottom: 14px;
    background: #ddd;
  }
  .modal-photo-placeholder {
    width: 200px; height: 220px;
    border-radius: 4px; margin-bottom: 14px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; font-weight: 700; color: #fff;
  }
  .modal-name { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .modal-email { font-size: 13px; color: #555; word-break: break-all; }

  .modal-right {
    flex: 1; min-width: 260px;
    padding: 24px 28px 24px 8px;
    border-left: 1px solid #eee;
  }
  .modal-country-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #444;
  }
  .modal-flag { font-size: 24px; }
  .modal-cohort {
    font-size: 16px; font-weight: 700; margin-bottom: 14px;
    color: var(--navy);
  }
  .modal-cohort .winner-label { color: var(--gold); margin-left: 6px; }
  .modal-bio { font-size: 14px; line-height: 1.65; color: #333; margin-bottom: 16px; }
  .modal-field { font-size: 14px; margin-bottom: 8px; }
  .modal-field strong { color: var(--navy); }
  .modal-field a, .modal-field span.link { color: var(--teal); }

  .close-btn {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: #666; line-height: 1;
  }
  .close-btn:hover { color: #000; }

  /* Loading / empty */
  .status { text-align: center; padding: 60px 20px; color: #888; grid-column: 1/-1; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #ddd;
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 560px) {
    .modal-left { width: 100%; padding-bottom: 0; align-items: center; }
    .modal-right { border-left: none; border-top: 1px solid #eee; padding: 16px 20px; }
    .modal-photo, .modal-photo-placeholder { width: 160px; height: 180px; }
  }
</style>
</head>
<body>

<!-- ╔══════════════════════════════════════════════════╗
     ║  PASTE YOUR GOOGLE SHEETS CSV URL BELOW         ║
     ╚══════════════════════════════════════════════════╝ -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWpy7prAGQ13eOeXIOZoUfIsZ_yynbAQar33rthMfnYs4J01fXnZknhdphSR1yMnuK/exec";
</script>

<div class="toolbar">
  <div class="search-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search by Name, University, Areas of Interest, Current Location, Countries Represented">
  </div>
  <div class="filter-row">
    <select id="f-year"><option value="">All Cohorts</option></select>
    <select id="f-country"><option value="">All Countries</option></select>
    <select id="f-location"><option value="">All Locations</option></select>
  </div>
</div>

<div class="meta" id="meta"></div>
<div class="grid" id="grid">
  <div class="status"><div class="spinner"></div>Loading directory…</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-left">
      <div id="m-photo"></div>
      <div class="modal-name" id="m-name"></div>
      <div class="modal-email" id="m-email"></div>
    </div>
    <div class="modal-right">
      <div class="modal-country-row">
        <span class="modal-flag" id="m-flag"></span>
        <span id="m-country"></span>
      </div>
      <div class="modal-cohort" id="m-cohort"></div>
      <div class="modal-bio" id="m-bio"></div>
      <div class="modal-field" id="m-represented"></div>
      <div class="modal-field" id="m-home"></div>
      <div class="modal-field" id="m-linkedin"></div>
    </div>
  </div>
</div>

<script>
// ── Country → flag emoji ───────────────────────────────────────────────
const countryToCode = {
  "afghanistan":"AF","albania":"AL","algeria":"DZ","angola":"AO","argentina":"AR",
  "armenia":"AM","australia":"AU","austria":"AT","azerbaijan":"AZ","bahrain":"BH",
  "bangladesh":"BD","belarus":"BY","belgium":"BE","benin":"BJ","bhutan":"BT",
  "bolivia":"BO","botswana":"BW","brazil":"BR","bulgaria":"BG","burkina faso":"BF",
  "burundi":"BI","cambodia":"KH","cameroon":"CM","canada":"CA","chile":"CL",
  "china":"CN","colombia":"CO","congo":"CG","costa rica":"CR","croatia":"HR",
  "cuba":"CU","czech republic":"CZ","denmark":"DK","ecuador":"EC","egypt":"EG",
  "el salvador":"SV","ethiopia":"ET","finland":"FI","france":"FR","georgia":"GE",
  "germany":"DE","ghana":"GH","greece":"GR","guatemala":"GT","guinea":"GN",
  "haiti":"HT","honduras":"HN","hungary":"HU","india":"IN","indonesia":"ID",
  "iran":"IR","iraq":"IQ","ireland":"IE","israel":"IL","italy":"IT","jamaica":"JM",
  "japan":"JP","jordan":"JO","kazakhstan":"KZ","kenya":"KE","kosovo":"XK",
  "kyrgyzstan":"KG","latvia":"LV","lebanon":"LB","liberia":"LR","libya":"LY",
  "lithuania":"LT","madagascar":"MG","malawi":"MW","malaysia":"MY","mali":"ML",
  "mauritania":"MR","mexico":"MX","moldova":"MD","mongolia":"MN","morocco":"MA",
  "mozambique":"MZ","myanmar":"MM","namibia":"NA","nepal":"NP","netherlands":"NL",
  "new zealand":"NZ","nicaragua":"NI","nigeria":"NG","north macedonia":"MK",
  "norway":"NO","pakistan":"PK","palestine":"PS","panama":"PA","paraguay":"PY",
  "peru":"PE","philippines":"PH","poland":"PL","portugal":"PT","romania":"RO",
  "russia":"RU","rwanda":"RW","saudi arabia":"SA","senegal":"SN","serbia":"RS",
  "sierra leone":"SL","singapore":"SG","slovakia":"SK","somalia":"SO",
  "south africa":"ZA","south korea":"KR","south sudan":"SS","spain":"ES",
  "sri lanka":"LK","sudan":"SD","sweden":"SE","switzerland":"CH","syria":"SY",
  "taiwan":"TW","tajikistan":"TJ","tanzania":"TZ","thailand":"TH","togo":"TG",
  "tunisia":"TN","turkey":"TR","turkmenistan":"TM","uganda":"UG","ukraine":"UA",
  "united arab emirates":"AE","united kingdom":"GB","united states":"US","uruguay":"UY",
  "uzbekistan":"UZ","venezuela":"VE","vietnam":"VN","yemen":"YE","zambia":"ZM","zimbabwe":"ZW"
};

function flagEmoji(country) {
  if (!country) return "🌍";
  const code = countryToCode[country.toLowerCase().trim()];
  if (!code) return "🌍";
  return [...code].map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))).join('');
}

function initials(name) {
  return (name || "?").split(" ").filter(Boolean).map(w => w[0]).join("").toUpperCase().slice(0,2);
}

// ── Data ──────────────────────────────────────────────────────────────
let allPeople = [], filtered = [];

function parseCSV(url) {
  return new Promise((res, rej) => {
    Papa.parse(url, {
      download: true, header: true, skipEmptyLines: true,
      complete: r => res(r.data),
      error: e => rej(e)
    });
  });
}

// Normalise a row → consistent field names regardless of CSV column casing
function normalise(row) {
  const g = k => {
    const found = Object.keys(row).find(r => r.trim().toLowerCase() === k.toLowerCase());
    return found ? (row[found] || "").trim() : "";
  };
  return {
    id:          g("Unique Contact ID"),
    name:        g("Full Name"),
    firstName:   g("Preferred First Name"),
    year:        g("Selection Year"),
    bio:         g("Winner Bio"),
    photo:       g("Winner Photo"),
    email:       g("Email"),
    country:     g("Current Location (Country)"),
    city:        g("Current Location (City/Town)"),
    countries:   g("Countries Represented"),
    pronouns:    g("Pronouns"),
    linkedin:    g("LinkedIn"),
  };
}

function populateFilter(id, values) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  [...sel.options].slice(1).forEach(o => o.remove());
  [...new Set(values.filter(Boolean).sort())].forEach(v => {
    const o = document.createElement("option");
    o.value = o.textContent = v;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

function buildFilters(people) {
  populateFilter("f-year",     people.map(p => p.year));
  populateFilter("f-country",  people.map(p => p.countries || p.country));
  populateFilter("f-location", people.map(p => p.country));
}

function applyFilters() {
  const q    = document.getElementById("search").value.toLowerCase();
  const yr   = document.getElementById("f-year").value;
  const cty  = document.getElementById("f-country").value;
  const loc  = document.getElementById("f-location").value;

  filtered = allPeople.filter(p => {
    const matchQ = !q || [p.name, p.year, p.bio, p.country, p.city, p.countries]
      .some(v => v.toLowerCase().includes(q));
    const matchYr  = !yr  || p.year === yr;
    const matchCty = !cty || p.countries === cty || p.country === cty;
    const matchLoc = !loc || p.country === loc;
    return matchQ && matchYr && matchCty && matchLoc;
  });
  renderGrid();
}

// ── Render ─────────────────────────────────────────────────────────────
function photoImg(url, cls, altCls, name) {
  if (url) {
    return `<img class="${cls}" src="${url}" alt="${name}" onerror="this.outerHTML='<div class=\\'${altCls}\\'>${initials(name)}</div>'" loading="lazy">`;
  }
  return `<div class="${altCls}">${initials(name)}</div>`;
}

function renderGrid() {
  const grid = document.getElementById("grid");
  document.getElementById("meta").textContent =
    filtered.length === allPeople.length
      ? `${allPeople.length} Fellows`
      : `${filtered.length} of ${allPeople.length} Fellows`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="status">No results found. Try a different search or filter.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" data-i="${i}" tabindex="0">
      ${photoImg(p.photo, "card-img", "card-img-placeholder", p.name)}
      <div class="card-body">
        <div class="card-flag">${flagEmoji(p.countries || p.country)}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-cohort">Cohort: <span>${p.year}</span></div>
        ${p.email ? `<div class="card-email">✉ ${p.email}</div>` : ""}
      </div>
    </div>
  `).join("");

  grid.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", () => openModal(filtered[+el.dataset.i]));
    el.addEventListener("keydown", e => e.key === "Enter" && openModal(filtered[+el.dataset.i]));
  });
}

// ── Modal ──────────────────────────────────────────────────────────────
function openModal(p) {
  document.getElementById("m-photo").innerHTML =
    photoImg(p.photo, "modal-photo", "modal-photo-placeholder", p.name);
  document.getElementById("m-name").textContent   = p.name;
  document.getElementById("m-email").textContent  = p.email;
  document.getElementById("m-flag").textContent   = flagEmoji(p.countries || p.country);
  document.getElementById("m-country").textContent = (p.countries || p.country || "").toUpperCase();
  document.getElementById("m-cohort").innerHTML   =
    `${p.year} <span class="winner-label">WINNER</span>`;
  document.getElementById("m-bio").textContent    = p.bio || "";
  document.getElementById("m-represented").innerHTML =
    p.countries ? `<strong>Countries Represented:</strong> <span class="link">${p.countries}</span>` : "";
  document.getElementById("m-home").innerHTML     =
    p.country ? `<strong>Home Country:</strong> <span class="link">${p.country}</span>` : "";
  document.getElementById("m-linkedin").innerHTML =
    p.linkedin ? `<strong>LinkedIn:</strong> <a href="${p.linkedin}" target="_blank">${p.linkedin}</a>` : "";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("overlay")) closeModal();
});
document.addEventListener("keydown", e => e.key === "Escape" && closeModal());

// ── Event listeners ───────────────────────────────────────────────────
["search","f-year","f-country","f-location"].forEach(id =>
  document.getElementById(id).addEventListener("input", applyFilters)
);

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allPeople = data.records.filter(p => p.name);
    filtered = [...allPeople];
    buildFilters(allPeople);
    renderGrid();
  } catch(e) {
    document.getElementById("grid").innerHTML =
      `<div class="status">❌ Could not load directory. Error: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
